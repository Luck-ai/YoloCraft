<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>YOLOCraft - SAM2 Editor</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "secondary": "#cdbdff",
                        "on-surface-variant": "#cac3d8",
                        "surface-variant": "#2d3449",
                        "tertiary": "#ffb688",
                        "outline": "#948ea1",
                        "secondary-container": "#4e3b8c",
                        "outline-variant": "#494455",
                        "on-surface": "#dbe2fd",
                        "primary-container": "#7c4dff",
                        "on-primary": "#370096",
                        "surface-container": "#171f33",
                        "surface-container-highest": "#2d3449",
                        "surface-dim": "#0b1326",
                        "surface-bright": "#31394e",
                        "surface-container-lowest": "#060d20",
                        "primary": "#cdbdff",
                        "error": "#ffb4ab",
                        "surface-container-high": "#222a3e",
                        "surface": "#0b1326"
                    },
                    fontFamily: {
                        "headline": ["Manrope"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    },
                },
            },
        }
    </script>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        body { background-color: #0b1326; color: #dbe2fd; font-family: 'Inter', sans-serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #494455; border-radius: 10px; }
        .glass-overlay { backdrop-filter: blur(12px); background: rgba(23, 31, 51, 0.7); }
    </style>
</head>
<body class="dark overflow-hidden flex flex-col h-screen">
<!-- TopNavBar -->
<header class="bg-[#0b1326] w-full px-6 h-16 flex items-center justify-between border-b border-white/5 z-[60] shrink-0">
    <div class="flex items-center gap-8">
        <span class="text-xl font-black tracking-tighter text-white uppercase font-headline flex items-center gap-2">
            <span class="material-symbols-outlined text-primary">auto_awesome_mosaic</span> YOLOCraft
        </span>
        <nav class="hidden md:flex gap-6 items-center" id="navTabs">
            <span id="navHomeBtn" class="cursor-pointer font-headline tracking-tight font-bold text-sm uppercase text-[#7C4DFF] border-b-2 border-[#7C4DFF] pb-1 transition-colors">Projects Dashboard</span>
            <span id="navEditorBtn" class="cursor-pointer hover:text-white font-headline tracking-tight font-bold text-sm uppercase text-slate-400 pb-1 hidden">Editor</span>
        </nav>
    </div>
    <div class="flex items-center gap-4">
        <button id="newProjectBtn" class="px-4 py-2 bg-primary-container text-white text-xs font-bold rounded-lg hover:bg-[#6833ea] transition-all flex items-center gap-2 shadow-lg">
            <span class="material-symbols-outlined text-[18px]">add</span> New Project
        </button>
    </div>
</header>

<div class="flex flex-1 overflow-hidden relative">

    <!-- HOME VIEW: Project Dashboard -->
    <div id="homeView" class="w-full h-full absolute inset-0 bg-[#060e20] overflow-y-auto custom-scrollbar p-8 z-50 flex flex-col">
        <div class="max-w-7xl mx-auto w-full flex-1 flex flex-col">
            <div class="flex justify-between items-end mb-8 shrink-0">
                <div>
                    <h1 class="font-headline text-3xl font-extrabold tracking-tight text-white">Your Workspaces</h1>
                    <p class="font-body text-sm text-outline mt-1">Configure project directories and SAM2 inference models</p>
                </div>
            </div>
            
            <div id="projectGrid" class="grid grid-cols-1 lg:grid-cols-2 xl:grid-cols-3 gap-6 pb-20 content-start">
                <!-- JS will render project cards here -->
            </div>
        </div>
    </div>


    <!-- EDITOR VIEW -->
    <div id="editorView" class="w-full h-full absolute inset-0 flex flex-row hidden">
        <!-- SideNavBar -->
        <aside class="bg-[#0b1326] flex flex-col items-center py-4 w-20 h-full border-r border-white/5 shadow-2xl z-40 shrink-0">
            <div class="mb-6 w-full flex justify-center border-b border-white/10 pb-4">
                <button id="closeEditorBtn" class="w-10 h-10 bg-surface-container-highest flex items-center justify-center rounded-lg hover:bg-surface-bright transition-colors text-outline hover:text-white" title="Back to Dashboard">
                    <span class="material-symbols-outlined">home</span>
                </button>
            </div>
            <div class="flex flex-col gap-6 w-full px-2">
                <div class="flex flex-col items-center gap-1">
                    <button class="w-12 h-12 flex items-center justify-center bg-[#7C4DFF] text-white rounded-lg shadow-[0_0_15px_rgba(124,77,255,0.4)] relative group pointer-events-none">
                        <span class="material-symbols-outlined">near_me</span>
                    </button>
                    <span class="font-body text-[10px] font-semibold tracking-widest uppercase text-slate-200">Point</span>
                </div>
            </div>
        </aside>

        <main class="flex-1 flex overflow-hidden bg-surface relative">
            
            <!-- Left Panel: Dataset Explorer -->
            <section class="w-80 bg-surface-container-lowest flex flex-col border-r border-white/5 shadow-sm z-10 shrink-0">
                <div class="p-4 border-b border-outline-variant/20 flex justify-between items-center bg-[#0b1326]">
                    <div>
                        <h3 class="font-headline font-bold text-xs uppercase tracking-widest text-primary flex items-center gap-2">
                            <span class="material-symbols-outlined text-[16px]">folder_open</span> Dataset Explorer
                        </h3>
                        <p id="imageCount" class="text-[10px] text-tertiary mt-1">...</p>
                    </div>
                    <button id="refreshProject" class="p-1.5 bg-surface-container-high hover:bg-surface-bright rounded text-outline hover:text-white transition-colors" title="Reload Dataset">
                        <span class="material-symbols-outlined text-[18px]">sync</span>
                    </button>
                </div>
                <div id="imageList" class="flex-1 overflow-y-auto p-4 custom-scrollbar flex flex-col gap-3">
                    <!-- Javascript will render images here with shrink-0 to prevent collapsing -->
                </div>
            </section>

            <!-- Center: Canvas Viewport -->
            <section class="flex-1 relative flex flex-col bg-[#060e20] shadow-inner overflow-hidden">
                <!-- Floating Canvas Toolbar -->
                <div class="absolute top-6 left-1/2 -translate-x-1/2 z-20 flex items-center gap-2 p-1.5 glass-overlay rounded-full shadow-2xl border border-outline-variant/20">
                    <button id="resetView" class="p-2 hover:bg-white/10 text-on-surface-variant hover:text-white rounded-full transition-all" title="Reset Pan/Zoom">
                        <span class="material-symbols-outlined text-[20px]">fit_screen</span>
                    </button>
                    <div class="w-px h-6 bg-outline-variant/30 mx-1"></div>
                    <button id="prevImage" class="p-2 hover:bg-white/10 text-on-surface-variant hover:text-white rounded-full transition-all" title="Previous Image (A)">
                        <span class="material-symbols-outlined text-[20px]">chevron_left</span>
                    </button>
                    <div class="text-[11px] font-mono text-outline px-2 max-w-[200px] truncate" id="currentName">No image selected</div>
                    <button id="nextImage" class="p-2 hover:bg-white/10 text-on-surface-variant hover:text-white rounded-full transition-all" title="Next Image (D)">
                        <span class="material-symbols-outlined text-[20px]">chevron_right</span>
                    </button>
                    <div class="w-px h-6 bg-outline-variant/30 mx-1"></div>
                    <button id="clearClicks" class="p-2 hover:bg-error/20 text-on-surface-variant hover:text-error rounded-full transition-all" title="Clear Clicks (C)">
                        <span class="material-symbols-outlined text-[20px]">delete_sweep</span>
                    </button>
                    <button id="runSegmentation" class="px-3 py-1.5 ml-1 bg-primary-container text-white font-bold text-xs rounded-full shadow-md hover:bg-[#6833ea] flex items-center gap-1 transition-all" title="Preview Mask (Space)">
                        <span class="material-symbols-outlined text-[16px]">auto_fix_high</span> Preview Mask
                    </button>
                </div>

                <!-- Main Annotation Surface -->
                <div class="flex-1 w-full h-full relative overflow-hidden flex items-center justify-center canvas-wrapper" style="cursor: crosshair;">
                    <canvas id="imageCanvas" class="max-w-none shadow-2xl origin-center border border-white/5"></canvas>
                </div>
                
                <!-- Bottom Status Indicator -->
                <div class="absolute bottom-4 left-4 z-20">
                    <div class="glass-overlay px-4 py-2 rounded-lg border border-white/10 flex items-center gap-3 shadow-lg">
                        <span id="statusIcon" class="w-2 h-2 rounded-full bg-secondary animate-pulse"></span>
                        <span id="status" class="text-[10px] font-mono font-bold text-on-surface-variant uppercase tracking-wider">Editor Loaded</span>
                    </div>
                </div>
            </section>

            <!-- Right Panel: Annotation & Export -->
            <section class="w-80 bg-surface-container-low flex flex-col border-l border-white/5 shrink-0 z-10">
                <div class="p-6 flex flex-col h-full overflow-y-auto custom-scrollbar">
                    
                    <!-- Class Selector & Approve -->
                    <div class="mb-6">
                        <label class="block font-headline font-extrabold text-[10px] uppercase tracking-widest text-on-surface-variant mb-2 flex items-center gap-2">
                            <span class="material-symbols-outlined text-[16px]">label</span> Active Class
                        </label>
                        <select id="classSelect" class="w-full bg-surface-container-highest border-outline-variant/30 text-white text-sm font-bold rounded-lg h-11 px-3 focus:ring-1 focus:ring-primary"></select>
                    </div>

                    <button id="approveMask" class="w-full py-2.5 bg-primary text-[#20005f] font-headline font-extrabold text-[11px] uppercase tracking-widest rounded-lg shadow-[0_4px_15px_rgba(124,77,255,0.2)] hover:-translate-y-0.5 active:scale-95 transition-all flex items-center justify-center gap-2 mb-6">
                        <span class="material-symbols-outlined text-[18px]">verified</span> Approve Mask
                    </button>

                    <div class="h-px bg-outline-variant/20 mb-6 w-full"></div>

                    <!-- Active Annotations List -->
                    <div class="flex flex-col flex-1 min-h-[250px]">
                        <h3 class="font-headline font-extrabold text-[10px] uppercase tracking-widest text-on-surface-variant flex items-center gap-2 mb-3">
                            <span class="material-symbols-outlined text-[16px]">layers</span> Approved Annotations
                        </h3>
                        <div id="annotationList" class="space-y-2 flex-1 overflow-y-auto custom-scrollbar pr-1 content-start">
                            <!-- JS renders annotations here -->
                        </div>
                    </div>

                    <div class="h-px w-full bg-outline-variant/20 my-6"></div>

                    <!-- Export Section -->
                    <div>
                         <h3 class="font-headline font-extrabold text-[10px] uppercase tracking-widest text-on-surface-variant mb-3 flex items-center gap-2">
                            <span class="material-symbols-outlined text-[16px]">publish</span> YOLO Build
                        </h3>
                        <div class="space-y-4">
                            <div class="flex gap-2 p-1.5 bg-surface-container border border-outline-variant/10 rounded-lg">
                                <div class="flex-1">
                                    <div class="text-[9px] font-bold text-outline mb-1 text-center uppercase tracking-widest">Train %</div>
                                    <input type="number" id="splitTrain" class="w-full bg-surface-container-highest border-none rounded text-center text-sm font-mono p-1 text-secondary focus:ring-1 focus:ring-secondary" value="80"/>
                                </div>
                                <div class="flex-1">
                                    <div class="text-[9px] font-bold text-outline mb-1 text-center uppercase tracking-widest">Val %</div>
                                    <input type="number" id="splitVal" class="w-full bg-surface-container-highest border-none rounded text-center text-sm font-mono p-1 text-tertiary focus:ring-1 focus:ring-tertiary" value="10"/>
                                </div>
                                <div class="flex-1">
                                    <div class="text-[9px] font-bold text-outline mb-1 text-center uppercase tracking-widest">Test %</div>
                                    <input type="number" id="splitTest" class="w-full bg-surface-container-highest border-none rounded text-center text-sm font-mono p-1 text-outline focus:ring-1 focus:ring-outline" value="10"/>
                                </div>
                            </div>

                            <button id="exportDataset" class="w-full bg-surface-container-high text-white font-headline font-bold text-[11px] uppercase tracking-widest py-3 rounded-xl border border-outline-variant/30 hover:bg-surface-bright transition-all flex items-center justify-center gap-2">
                                <span class="material-symbols-outlined text-[18px]">rocket_launch</span> Build Dataset
                            </button>
                        </div>
                    </div>

                </div>
            </section>
        </main>
    </div>
</div>

<div id="toastContainer" class="fixed bottom-6 right-6 z-[100] flex flex-col gap-2 pointer-events-none"></div>

<script src="/app.js" type="module"></script>
</body>
</html>
